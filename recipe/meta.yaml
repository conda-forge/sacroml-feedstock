{% set name = "sacroml" %}
{% set version = "1.4.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7727ae4e605913b54a2971fae67ad6918a04420661ebaab0e5591a65521edc6c

build:
  number: 0
  noarch: python
  entry_points:
    - sacroml = sacroml.main:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - python {{ python_min }}
    - setuptools
    - pip
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - acro ==0.4.11
    - fpdf
    - pypdf
    - multiprocess
    - scikit-learn >=1.0,<2.0
    - xgboost
    - dictdiffer
    - pytorch
    - prompt-toolkit

test:
  imports:
    - sacroml
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/AI-SDC/SACRO-ML
  summary: Tools for the statistical disclosure control of machine learning models
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rpreen
